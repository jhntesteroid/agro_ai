<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; background: var(--primary); color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { width: 95%; max-width: 500px; padding: 20px 0; }
        #video-wrapper { width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 25px; text-align: center; }
        #snap { background: var(--primary); color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; }
        #result-card { background: white; margin-top: 20px; padding: 25px; border-radius: 20px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        .status { font-size: 15px; margin-top: 12px; color: #7f8c8d; }
        .loader { display: none; margin: 15px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header><i class="fa-solid fa-seedling"></i> <b>АЛТАЙ-АГРО ИИ</b></header>

<div class="container">
    <div id="video-wrapper"><video id="video" autoplay playsinline></video></div>
    <div class="controls">
        <button id="snap"><i class="fa-solid fa-camera"></i></button>
        <div id="status" class="status">Наведите на лист и нажмите кнопку</div>
        <div id="loader" class="loader"></div>
    </div>
    <div id="result-card">
        <h2 id="res-title" style="margin:0; color: var(--primary);">Название</h2>
        <div id="res-prob" style="color: #95a5a6; font-size: 14px; margin-bottom: 15px;">Точность: 0%</div>
        <div id="res-advice" style="background:#f0fff4; padding:15px; border-radius:10px; border-left:4px solid #2ecc71; font-size:14px;"></div>
        <br>
        <button onclick="location.reload()" style="width:100%; padding:12px; background: #eee; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">НОВЫЙ СНИМОК</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('result-card');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { status.innerText = "Ошибка камеры: " + e.message; }
    }

    snap.addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Получаем чистую строку Base64
        const base64String = canvas.toDataURL('image/jpeg', 0.5);
        
        status.innerText = "Связь с сервером Amvera...";
        loader.style.display = "block";
        snap.style.display = "none";

        try {
            const serverUrl = 'https://amvera.io';

            const response = await fetch(serverUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ images: [base64String] }) // Обернуто в массив один раз
            });

            const data = await response.json();
            loader.style.display = "none";

            if (data.suggestions && data.suggestions.length > 0) {
                const best = data.suggestions[0]; // Берем первый (самый вероятный) результат
                const name = (best.plant_details && best.plant_details.common_names) 
                             ? best.plant_details.common_names[0] 
                             : best.plant_name;

                status.style.display = "none";
                resultCard.style.display = "block";
                document.getElementById('res-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
                document.getElementById('res-prob').innerText = `Точность: ${(best.probability * 100).toFixed(1)}%`;
                document.getElementById('res-advice').innerHTML = "<b>Агро-совет:</b> Растение определено успешно через сервер Amvera. Проверьте типичные болезни Алтайского края.";
            } else {
                throw new Error("ИИ не смог распознать растение. Попробуйте фото крупнее.");
            }
        } catch (err) {
            loader.style.display = "none";
            snap.style.display = "inline-block";
            status.innerText = "Ошибка: " + err.message;
        }
    });

    init();
</script>
</body>
</html>
