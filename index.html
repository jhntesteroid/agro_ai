<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; background: var(--primary); color: white; padding: 15px 0; text-align: center; }
        .container { width: 95%; max-width: 500px; margin-top: 20px; }
        #video-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 20px; text-align: center; }
        #snap { background: var(--primary); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 25px; cursor: pointer; }
        #debug-log { background: #333; color: #0f0; padding: 10px; margin-top: 10px; font-size: 10px; border-radius: 5px; display: none; text-align: left; max-height: 150px; overflow-y: auto; }
        #result-card { background: white; margin-top: 20px; padding: 20px; border-radius: 15px; display: none; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<header><i class="fa-solid fa-leaf"></i> <b>АЛТАЙ-АГРО ИИ</b></header>

<div class="container">
    <div id="video-wrapper"><video id="video" autoplay playsinline></video></div>
    <div id="debug-log"></div>
    <div class="controls">
        <button id="snap"><i class="fa-solid fa-camera"></i></button>
        <div id="status" style="margin-top:10px; font-size:14px; color:#7f8c8d;">Наведите на лист</div>
    </div>
    <div id="result-card">
        <h3 id="res-title" style="margin:0; color: var(--primary);">Результат</h3>
        <p id="res-text"></p>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:#eee; border:none; border-radius:5px;">Заново</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const debugLog = document.getElementById('debug-log');
    const resultCard = document.getElementById('result-card');

    const apiKey = 'CdvGNro7PblGEyDM9dzyxC39wkQejFRd2nuwJ8w7eBVUaTkCwT'; 

    function log(msg) {
        debugLog.style.display = "block";
        debugLog.innerHTML += `> ${msg}<br>`;
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { log("Ошибка камеры: " + e.message); }
    }

    snap.addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // 1. Получаем чистую строку Base64
        const base64Data = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
        
        status.innerText = "Анализ...";
        snap.style.display = "none";
        log("Отправка запроса...");

        try {
            const response = await fetch('https://api.plant.id/v2/identify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Api-Key': apiKey 
                },
                body: JSON.stringify({ 
                    images: [base64Data], 
                    organs: ["leaf"] 
                })
            });

            log("Статус ответа: " + response.status);

            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.message || "Ошибка API " + response.status);
            }

            resultCard.style.display = "block";
            status.style.display = "none";
            
            if (data.suggestions && data.suggestions[0]) {
                const best = data.suggestions[0];
                document.getElementById('res-title').innerText = best.plant_name;
                document.getElementById('res-text').innerHTML = `Точность: ${(best.probability * 100).toFixed(1)}%`;
                log("Успешно распознано");
            } else {
                log("ИИ не нашел совпадений");
            }
        } catch (err) {
            log("КРИТИЧЕСКАЯ ОШИБКА: " + err.message);
            status.innerText = "Ошибка. См. лог ниже.";
            snap.style.display = "inline-block";
        }
    });

    startCamera();
</script>
</body>
</html>
