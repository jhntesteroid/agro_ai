<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: #27ae60; color: white; padding: 15px 0; text-align: center; }
        #video-wrapper { width: 90%; max-width: 400px; aspect-ratio: 3/4; background: #000; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 20px; text-align: center; }
        #snap { background: #27ae60; color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 25px; }
        #result-card { display: none; background: white; width: 85%; max-width: 400px; padding: 20px; margin-top: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        .advice { background: #eafaf1; padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<header><b>АЛТАЙ-АГРО ИИ</b></header>

<div id="video-wrapper"><video id="video" autoplay playsinline></video></div>

<div class="controls">
    <button id="snap"><i class="fa-solid fa-camera"></i></button>
    <div id="status" style="margin-top:10px; color:#666;">Наведите на лист</div>
</div>

<div id="result-card">
    <h2 id="res-title" style="margin:0; color:#27ae60;">Название</h2>
    <p id="res-prob" style="font-size:12px; color:#999;"></p>
    <div id="res-advice" class="advice"></div>
    <br>
    <button onclick="location.reload()" style="width:100%; padding:10px; border:none; background:#eee; border-radius:5px;">ЗАНОВО</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const resultCard = document.getElementById('result-card');

    const apiKey = 'CdvGNro7PblGEyDM9dzyxC39wkQejFRd2nuwJ8w7eBVUaTkCwT'; 

    async function start() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = s;
        } catch (e) { status.innerText = "Ошибка камеры: " + e.message; }
    }

    snap.addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Оптимизируем картинку (уменьшаем размер до 0.4, чтобы пролезло через VPN)
        const base64 = canvas.toDataURL('image/jpeg', 0.4).replace(/^data:image\/(png|jpg|jpeg);base64,/, "");
        
        status.innerText = "Отправка данных...";
        snap.style.display = "none";

        try {
            const response = await fetch('https://plant.id', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Api-Key': apiKey 
                },
                body: JSON.stringify({
                    images: [base64],
                    organs: ["leaf"]
                })
            });

            if (!response.ok) throw new Error("Код: " + response.status);

            const data = await response.json();
            status.style.display = "none";
            resultCard.style.display = "block";
            
            if (data.suggestions && data.suggestions.length > 0) {
                const b = data.suggestions[0];
                let name = b.plant_name;
                
                // РУЧНОЙ ПЕРЕВОД ДЛЯ ТЕСТА
                if (name.toLowerCase().includes("ficus")) name = "Фикус каучуконосный";
                if (name.toLowerCase().includes("triticum")) name = "Пшеница";

                document.getElementById('res-title').innerText = name;
                document.getElementById('res-prob').innerText = `Точность: ${(b.probability * 100).toFixed(1)}%`;
                document.getElementById('res-advice').innerHTML = `<b>Совет для Алтая:</b> Растение определено. Проверьте условия освещенности в помещении.`;
            }
        } catch (err) {
            status.innerText = "Ошибка: " + err.message + ". Попробуйте другой сервер VPN.";
            snap.style.display = "inline-block";
        }
    });

    start();
</script>
</body>
</html>
