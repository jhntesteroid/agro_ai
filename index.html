<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        #video-container { width: 100%; max-width: 400px; margin: auto; border: 3px solid #2ecc71; border-radius: 15px; overflow: hidden; background: #000; }
        video, canvas { width: 100%; display: block; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h2>🌱 Агро-Помощник Алтая</h2>
    <p>Наведите камеру на лист растения</p>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <button id="snap">Сфотографировать</button>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="result">Ожидание снимка...</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const result = document.getElementById('result');

        // Доступ к камере
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } // Используем заднюю камеру
                });
                video.srcObject = stream;
            } catch (err) {
                result.innerText = "Ошибка доступа к камере: " + err;
            }
        }

        // Снимок
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            result.innerHTML = "<i>Идет анализ (здесь будет запрос к ИИ)...</i>";
            
            // Имитация работы ИИ
            setTimeout(() => {
                result.innerHTML = "<b>Результат:</b> Похоже на септориоз. <br> Рекомендуется обработка фунгицидами. <br> <small>Ближайший магазин: Барнаул, пр. Ленина</small>";
            }, 2000);
        });

        initCamera();
    </script>
</body>
</html>
