<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; }
        body { font-family: sans-serif; margin: 0; background: #f4f2f5; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: var(--primary); color: white; padding: 15px 0; text-align: center; }
        #video-wrapper { width: 90%; max-width: 400px; aspect-ratio: 3/4; background: #000; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 20px; text-align: center; }
        #snap { background: var(--primary); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 25px; }
        #result-card { display: none; background: white; width: 90%; max-width: 400px; padding: 20px; margin-top: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header><b>АЛТАЙ-АГРО ИИ</b></header>

<div id="video-wrapper"><video id="video" autoplay playsinline></video></div>

<div class="controls">
    <button id="snap"><i class="fa-solid fa-camera"></i></button>
    <div id="status" style="margin-top:10px; color:#666;">Наведите на лист</div>
</div>

<div id="result-card">
    <h3 id="res-title">Результат</h3>
    <p id="res-text"></p>
    <button onclick="location.reload()" style="width:100%; padding:10px; border:none; border-radius:5px;">Заново</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const resultCard = document.getElementById('result-card');

    const apiKey = 'CdvGNro7PblGEyDM9dzyxC39wkQejFRd2nuwJ8w7eBVUaTkCwT';

    async function start() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = s;
        } catch (e) { status.innerText = "Ошибка камеры: " + e.message; }
    }

    snap.addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // ОЧЕНЬ ВАЖНО: Отрезаем "data:image/jpeg;base64,"
        const base64Image = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
        
        status.innerText = "Связь с ИИ...";
        snap.style.display = "none";

        try {
            const response = await fetch('https://api.plant.id/v2/identify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Api-Key': apiKey 
                },
                body: JSON.stringify({
                    images: [base64Image],
                    organs: ["leaf"],
                    modifiers: ["crops_fast"]
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.message || "Ошибка сервера " + response.status);
            }

            const data = await response.json();
            status.style.display = "none";
            resultCard.style.display = "block";
            
            if (data.suggestions && data.suggestions.length > 0) {
                const b = data.suggestions[0];
                document.getElementById('res-title').innerText = b.plant_name;
                document.getElementById('res-text').innerHTML = `Точность: ${(b.probability * 100).toFixed(1)}% <br><br> Растение узнано!`;
            }
        } catch (err) {
            alert("КРИТИЧЕСКАЯ ОШИБКА: " + err.message);
            status.innerText = "Ошибка. Проверьте интернет или ключ.";
            snap.style.display = "inline-block";
        }
    });

    start();
</script>
</body>
</html>
