<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро ИИ</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; background: var(--primary); color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { width: 95%; max-width: 500px; margin-top: 20px; }
        #video-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 25px; text-align: center; }
        #snap { background: var(--primary); color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }
        #result-card { background: white; margin-top: 20px; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; border-left: 5px solid var(--primary); }
        .status { font-size: 14px; margin-top: 10px; color: #7f8c8d; min-height: 20px; }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header><i class="fa-solid fa-leaf"></i> <b>АЛТАЙ-АГРО ИИ</b></header>

<div class="container">
    <div id="video-wrapper"><video id="video" autoplay playsinline></video></div>
    <div class="controls">
        <button id="snap"><i class="fa-solid fa-camera"></i></button>
        <div id="status" class="status">Запуск камеры...</div>
        <div id="loader" class="loader"></div>
    </div>
    <div id="result-card">
        <h3 id="res-title" style="margin-top:0; color: var(--primary);">Результат</h3>
        <p id="res-text"></p>
        <hr>
        <small id="res-location">📍 Локация: Алтайский край</small>
        <br><br>
        <button onclick="location.reload()" style="background: #ecf0f1; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%;">Новый снимок</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('result-card');
    const resTitle = document.getElementById('res-title');
    const resText = document.getElementById('res-text');

    const apiKey = 'CdvGNro7PblGEyDM9dzyxC39wkQejFRd2nuwJ8w7eBVUaTkCwT'; 

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            status.innerText = "Камера готова";
        } catch (e) { 
            status.innerText = "Ошибка камеры: " + e.message; 
            status.style.color = "red";
        }
    }

    snap.addEventListener('click', async () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Получаем чистый Base64
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        const base64Image = dataUrl.split(',')[1];
        
        status.innerText = "Анализ...";
        loader.style.display = "block";
        snap.style.display = "none";

        try {
            const response = await fetch('https://plant.id', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'Api-Key': apiKey 
                },
                body: JSON.stringify({ 
                    images: [base64Image], 
                    organs: ["leaf"] 
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || `Ошибка сервера (${response.status})`);
            }

            loader.style.display = "none";
            status.style.display = "none";
            resultCard.style.display = "block";

            if (data.suggestions && data.suggestions.length > 0) {
                const best = data.suggestions[0];
                resTitle.innerText = best.plant_name;
                resText.innerHTML = `Точность: ${(best.probability * 100).toFixed(1)}%<br><br><b>Совет:</b> Растение определено. Проверьте типичные болезни Алтайского края.`;
            } else {
                resTitle.innerText = "Неизвестно";
                resText.innerText = "ИИ не смог уверенно распознать объект.";
            }
        } catch (err) {
            loader.style.display = "none";
            snap.style.display = "inline-block";
            status.innerText = "Ошибка: " + err.message;
            status.style.color = "red";
        }
    });

    init();
</script>
</body>
</html>
