<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай-Агро Офлайн</title>
    <!-- Подключаем легкий ИИ прямо в браузер -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e8f5e9; padding: 20px; margin: 0; }
        #v { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { background: #2e7d32; color: white; padding: 20px; border-radius: 50%; border: none; font-size: 24px; margin-top: 20px; cursor: pointer; }
        #res { margin-top: 20px; padding: 20px; background: white; border-radius: 15px; display: none; }
    </style>
</head>
<body>
    <h3>🌿 Алтай-Агро ИИ (Offline)</h3>
    <video id="v" autoplay playsinline></video>
    <div id="status">Загрузка ИИ-модели...</div>
    <button id="snap" class="btn">📸</button>

    <div id="res">
        <h2 id="name" style="color:#2e7d32">Анализ...</h2>
        <p id="advice"></p>
        <button onclick="location.reload()">Заново</button>
    </div>

    <script>
        const v = document.getElementById('v'), s = document.getElementById('status'), n = document.getElementById('name'), a = document.getElementById('advice'), res = document.getElementById('res');
        let model;

        // 1. Загружаем камеру и ИИ
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                v.srcObject = stream;
                s.innerText = "ИИ загружается (1-2 Мб)...";
                model = await mobilenet.load();
                s.innerText = "ИИ готов! Наведите на растение.";
            } catch (e) { s.innerText = "Ошибка: " + e.message; }
        }

        // 2. Распознаем локально (без сервера!)
        document.getElementById('snap').onclick = async () => {
            if (!model) return;
            s.innerText = "Мгновенный анализ...";
            
            const predictions = await model.classify(v);
            
            s.style.display = "none";
            res.style.display = "block";
            
            const best = predictions[0];
            n.innerText = best.className; // Название на английском (базовая модель)
            
            // Локальная логика для Алтая
            let advice = "Растение определено локальным ИИ. Для точного диагноза болезней требуется интернет.";
            if (best.className.toLowerCase().includes('leaf')) {
                advice = "<b>Совет для Алтая:</b> Это лист растения. Проверьте его на наличие пятен или насекомых.";
            }
            
            a.innerHTML = `Точность: ${(best.probability * 100).toFixed(1)}% <br><br> ${advice}`;
        };

        init();
    </script>
</body>
</html>
